{{- if .Values.enabled }}
{{- if .Values.serviceMonitor.enabled }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: {{ include "lareira-vigia.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lareira-vigia.labels" . | nindent 4 }}
spec:
  groups:
    - name: vigia
      interval: 1m
      rules:
        - alert: VigiaDown
          expr: up{job=~".*vigia.*"} == 0
          for: 2m
          labels:
            severity: critical
            saguao_component: vigia
            saguao_cluster: {{ .Values.cluster | quote }}
          annotations:
            summary: "vigia is down on cluster {{ .Values.cluster }} — every gated request is failing"
            runbook_url: "https://github.com/pleme-io/theory/blob/main/SAGUAO.md#vi3-failure-modes-and-mitigations"
        - alert: VigiaCrachaUnreachable
          expr: vigia_cracha_errors_total > 10
          for: 5m
          labels:
            severity: warning
            saguao_component: vigia
            saguao_cluster: {{ .Values.cluster | quote }}
          annotations:
            summary: "vigia on {{ .Values.cluster }} cannot reach crachá"
            description: "If this persists, consider enabling stale-OK fallback or break-glass mode per SAGUAO.md §VI.3."
{{- end }}
{{- end }}
