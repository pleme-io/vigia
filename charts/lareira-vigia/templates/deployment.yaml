apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lareira-vigia.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lareira-vigia.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "lareira-vigia.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lareira-vigia.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lareira-vigia.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vigia
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["vigia"]
          env:
            - name: VIGIA_ADDR
              value: "0.0.0.0:9000"
            - name: VIGIA_PASSAPORTE_URL
              value: {{ .Values.passaporteUrl | quote }}
            - name: VIGIA_CRACHA_URL
              value: {{ .Values.crachaUrl | quote }}
            - name: VIGIA_CLUSTER
              value: {{ .Values.cluster | quote }}
            - name: VIGIA_LOCATION
              value: {{ .Values.location | quote }}
            - name: VIGIA_DECISION_TTL_SECS
              value: {{ .Values.decisionTtlSecs | quote }}
            - name: VIGIA_JWT_CACHE_SIZE
              value: {{ .Values.jwtCacheSize | quote }}
            - name: VIGIA_STALE_OK_SECS
              value: {{ .Values.staleOkSecs | quote }}
            - name: VIGIA_AUDIENCE
              value: {{ .Values.audience | quote }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            {{- if .Values.breakGlass.enabled }}
            - name: VIGIA_BREAK_GLASS_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.breakGlass.secretName }}
                  key: token
                  optional: true
            {{- end }}
          ports:
            - name: auth
              containerPort: 9000
            - name: metrics
              containerPort: 9000
          livenessProbe:
            httpGet:
              path: /healthz
              port: auth
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: auth
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
